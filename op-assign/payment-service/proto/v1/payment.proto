syntax = "proto3";

package payment.v1;

option go_package = "github.com/Fipaan/ap2-uni-op-gen/op-assign/payment-service/proto/v1;paymentV1";

import "google/protobuf/timestamp.proto";

service PaymentService {
  rpc ProcessPayment(PaymentRequest) returns (PaymentResponse);
  rpc ListPayments(ListPaymentsRequest) returns (PaymentResponse);
}

message PaymentRequest {
  string order_id = 1;
  int64 amount = 2;
}

message PaymentResponse {
  string payment_id = 1;
  string transaction_id = 2;
  string status = 3;
  google.protobuf.Timestamp processed_at = 4;
}


message ListPaymentsRequest {
  string status = 1;
}

message PaymentFull {
	payment_id     string
	order_id       string
	transaction_id string
	amount         int64
	status         string
}

message ListPaymentsResponse {
  repeated PaymentFull payments = 1;
}
